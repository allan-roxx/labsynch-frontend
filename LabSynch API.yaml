components:
  schemas:
    AccountStatusEnum:
      enum:
      - ACTIVE
      - SUSPENDED
      - BLOCKED
      type: string
      description: |-
        * `ACTIVE` - Active
        * `SUSPENDED` - Suspended
        * `BLOCKED` - Blocked
    ActionEnum:
      enum:
      - CREATE
      - UPDATE
      - DELETE
      - LOGIN
      - LOGOUT
      - CANCEL
      - ISSUE
      - RETURN
      - PAYMENT
      - RESOLVE
      type: string
      description: |-
        * `CREATE` - Create
        * `UPDATE` - Update
        * `DELETE` - Delete
        * `LOGIN` - Login
        * `LOGOUT` - Logout
        * `CANCEL` - Cancel
        * `ISSUE` - Issue
        * `RETURN` - Return
        * `PAYMENT` - Payment
        * `RESOLVE` - Resolve
    AdminSchoolProfileUpdate:
      type: object
      description: For ADMIN updating a school — includes status and financial fields.
      properties:
        school_name:
          type: string
          maxLength: 255
        registration_number:
          type: string
          maxLength: 100
        physical_address:
          type: string
        county:
          type: string
          maxLength: 100
        contact_person:
          type: string
          maxLength: 255
        contact_designation:
          type: string
          maxLength: 255
        credit_limit:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        account_status:
          $ref: '#/components/schemas/AccountStatusEnum'
      required:
      - school_name
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        actor:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: User who performed the action. Null for system-triggered actions.
        actor_email:
          type: string
          format: email
          readOnly: true
        action:
          allOf:
          - $ref: '#/components/schemas/ActionEnum'
          readOnly: true
        app_label:
          type: string
          readOnly: true
        model_name:
          type: string
          readOnly: true
        object_id:
          type: string
          readOnly: true
          description: Primary key (UUID) of the affected record.
        object_repr:
          type: string
          readOnly: true
          description: Human-readable string representation of the affected record
            at the time of the action.
        changes:
          readOnly: true
          nullable: true
          description: Dict describing what changed. Keys are field names; values
            are [old, new] pairs.
        ip_address:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - actor
      - actor_email
      - app_label
      - changes
      - created_at
      - id
      - ip_address
      - model_name
      - object_id
      - object_repr
    BookingCreate:
      type: object
      description: Validates incoming booking requests.
      properties:
        pickup_date:
          type: string
          format: date
        return_date:
          type: string
          format: date
        special_instructions:
          type: string
          default: ''
        items:
          type: array
          items:
            $ref: '#/components/schemas/BookingItemCreate'
      required:
      - items
      - pickup_date
      - return_date
    BookingItemCreate:
      type: object
      description: Validates individual items within a booking request.
      properties:
        equipment:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
      required:
      - equipment
      - quantity
    BookingItemRead:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        equipment:
          allOf:
          - $ref: '#/components/schemas/EquipmentRead'
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        unit_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - equipment
      - id
      - quantity
      - subtotal
      - unit_price
    BookingRead:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        booking_reference:
          type: string
          maxLength: 50
        school_name:
          type: string
          readOnly: true
        pickup_date:
          type: string
          format: date
        return_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/BookingStatusEnum'
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        special_instructions:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        booking_items:
          type: array
          items:
            $ref: '#/components/schemas/BookingItemRead'
          readOnly: true
      required:
      - booking_items
      - booking_reference
      - created_at
      - id
      - pickup_date
      - return_date
      - school_name
    BookingStatusEnum:
      enum:
      - PENDING
      - CONFIRMED
      - PAID
      - ISSUED
      - RETURNED
      - COMPLETED
      - OVERDUE
      - CANCELLED
      type: string
      description: |-
        * `PENDING` - Pending
        * `CONFIRMED` - Confirmed
        * `PAID` - Paid
        * `ISSUED` - Issued
        * `RETURNED` - Returned
        * `COMPLETED` - Completed
        * `OVERDUE` - Overdue
        * `CANCELLED` - Cancelled
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
      required:
      - confirm_password
      - new_password
      - old_password
    ConditionEnum:
      enum:
      - NEW
      - GOOD
      - FAIR
      - NEEDS_MAINTENANCE
      type: string
      description: |-
        * `NEW` - New
        * `GOOD` - Good
        * `FAIR` - Fair
        * `NEEDS_MAINTENANCE` - Needs Maintenance
    DamageReportCreate:
